name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web frontend
        run: NODE_ENV=production pnpm vite build --base './'

      - name: Clean build for Electron
        run: |
          cd dist/public
          sed -i '/<script src="\/__manus__\/debug-collector.js" defer><\/script>/d' index.html
          python3 -c "
          import re
          with open('index.html', 'r') as f:
             html = f.read()
          html = re.sub(r'<script id=\"manus-runtime\">.*?</script>\s*', '', html, flags=re.DOTALL)
          with open('index.html', 'w') as f:
             f.write(html)
          "
          rm -rf __manus__


      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/public/
          retention-days: 1

  release-mac:
    needs: build-frontend
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Copy frontend into Electron shell
        run: |
          rm -rf desktop/build/assets desktop/build/index.html
          cp -r dist/index.html desktop/build/
          cp -r dist/assets desktop/build/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync version from git tag
        working-directory: desktop
        shell: bash
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "Setting desktop version to $VERSION"
          npm pkg set version="$VERSION"
          cat package.json | grep version

      - name: Install Electron dependencies
        working-directory: desktop
        run: npm install

      - name: Import Apple signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build and publish macOS app
        working-directory: desktop
        env:
          CSC_LINK: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.P12_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --mac --publish always

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  release-windows:
    needs: build-frontend
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Copy frontend into Electron shell
        shell: bash
        run: |
          rm -rf desktop/build/assets desktop/build/index.html
          cp -r dist/index.html desktop/build/
          cp -r dist/assets desktop/build/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync version from git tag
        working-directory: desktop
        shell: bash
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "Setting desktop version to $VERSION"
          npm pkg set version="$VERSION"
          cat package.json | grep version
          
      - name: Install Electron dependencies
        working-directory: desktop
        run: npm install

      - name: Build and publish Windows app
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --win --publish always
