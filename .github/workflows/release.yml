# ─────────────────────────────────────────────────────────────────────────────
# Developmental Assessment Suite — Automated Release Workflow
# ─────────────────────────────────────────────────────────────────────────────
# Triggers when you push a version tag like v1.4.0
# Builds the web frontend, packages the Electron app for macOS and Windows,
# signs + notarizes the macOS build, and publishes a GitHub Release.
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

# Only allow one release build at a time
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Build the web frontend (shared by both platform jobs) ────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web frontend
        run: pnpm run build

      # Upload the compiled frontend so the platform jobs can download it
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 1

  # ─── macOS: sign, notarize, publish ───────────────────────────────────
  release-mac:
    needs: build-frontend
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Copy frontend into Electron shell
        run: |
          rm -rf desktop/build/assets desktop/build/index.html
          cp -r dist/index.html desktop/build/
          cp -r dist/assets desktop/build/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Electron dependencies
        working-directory: desktop
        run: npm install

      # Import the Apple Developer ID certificate into a temporary keychain
      - name: Import Apple signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode the certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate into keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # Build, sign, notarize, and publish to GitHub Releases
      - name: Build and publish macOS app
        working-directory: desktop
        env:
          # Code signing — electron-builder reads these automatically
          CSC_LINK: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.P12_PASSWORD }}
          # Notarization — read by your notarize.js afterSign hook
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # GitHub Release upload
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --mac --publish always

      # Clean up the temporary keychain
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  # ─── Windows: build and publish (no code signing) ─────────────────────
  release-windows:
    needs: build-frontend
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Copy frontend into Electron shell
        shell: bash
        run: |
          rm -rf desktop/build/assets desktop/build/index.html
          cp -r dist/index.html desktop/build/
          cp -r dist/assets desktop/build/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Electron dependencies
        working-directory: desktop
        run: npm install

      - name: Build and publish Windows app
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --win --publish always
